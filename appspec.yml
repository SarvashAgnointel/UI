version: 0.0
os: linux
files:
  - source: /
    destination: /var/app/current/
permissions:
  - object: /
    owner: webapp
    group: webapp
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
